# tranquil-botanical-sketch.yaml
# 宁静植物线稿 — 来源：2026-05-11 蛋姐群，Lucien 发给小K的原始 prompt 提炼

id: tranquil-botanical-sketch
display_name: "宁静植物线稿"
category: illustration
preferred_backend: gpt-image-2
aspect_ratio: "1:1"   # 默认方图，亦适合 3:4 / 4:3

description: |
  极简线条插画美学：人物以平面剪影呈现，背景填以细腻植物细节；
  墨线匀称柔和，调色高度克制（黑 / 灰 / 象牙）+ 浅珊瑚点缀，
  整体氛围安静平和，无阴影或透视层次感。

# ─── 核心视觉语言 ───────────────────────────────────────────
palette:
  base: ["#1a1a1a", "#888888", "#F8F4EC"]   # 黑、中灰、象牙
  accent: "#F4A896"                          # 浅珊瑚
  background: "#FAFAF6"                      # 接近白的象牙底

visual_language:
  - 线条：细腻均匀的墨线（0.5-1px 视觉感，无粗细变化）
  - 形状：平面几何简化，无透视体积感
  - 植物：背景铺满细节植物（叶片/枝蔓/小花），密度中高，平面化
  - 人物：极简线稿轮廓，不强调五官细节，以姿态/轮廓传情
  - 氛围：安静、平和、留白充足

# ─── Prompt 模板 ────────────────────────────────────────────
prompt_template: |
  Simple line illustration aesthetic. {subject}.
  Flat minimal shapes, delicate and uniform ink line work.
  Dense but flat botanical background — leaves, branches, small flowers in line art style.
  Monochromatic palette: black, gray, and ivory tones, with a subtle touch of light coral (#F4A896) as accent.
  Quiet, peaceful atmosphere. No shading, no perspective depth.
  Clean white-ivory background. Minimalist, editorial feel.
  High quality, 2048x2048.

# subject 占位符填写指南：
# - 人物：角色的外形描述/动作/关系（e.g. "two people sitting together"）
# - 非人物：主体物/场景（e.g. "a cat resting on an open book"）

# ─── 变体 ──────────────────────────────────────────────────
variants:
  cozy:
    modifier: "cozy indoor setting, warm ivory, slightly more detail in plants"
  minimal:
    modifier: "extreme minimalism, fewer botanical details, more white space"
  two_figures:
    modifier: "two figures, equal visual weight, mirrored composition"

# ─── 用途亲和 ─────────────────────────────────────────────
use_case_affinity: [social-media-post, profile-avatar, poster-flyer]
avoid_for: [ecommerce-main-image, product-marketing, youtube-thumbnail]

# ─── 防坑 ─────────────────────────────────────────────────
pitfalls:
  - 不要加透明水彩晕染或水彩纹理，会破坏干净的线稿感
  - 不要强调人物五官，线条人物应是抽象感轮廓
  - 植物不要过于写实 3D，保持平面线描风格
  - 不要出现其他高饱和色彩，只用浅珊瑚作点缀

# ─── Curator 字段 ───────────────────────────────────────────
pinned: false
source: user_derived   # 从用户真实 prompt 中提炼
created_at: 2026-05-11
