name: 波普街头漫画 Pop × Street × Manga
source: "notoro_ai@x.com/status/2051154269064278132"
placeholder: "[在此处填写您的主体，例如：一位街头少年 / 机甲战士 / 霓虹城市角落的人物]"
prompt: |
  Convert to a bold Pop Art × Street Art style infused with modern anime and manga aesthetics. Sharp, ultra-clean black ink line art with flat cel shading as the structural foundation—no airbrushing, no gradients, only clean fills. Complex interlocking geometric patterns (triangles, diamonds, circuit-like grids) woven throughout the background and costume details, creating a stylish, graphic-novel density. Ben-Day dot halftones (ベン・デイ・ドット) applied selectively to mid-tones and shadows for retro comic texture, borrowing from Roy Lichtenstein's visual language. Color palette: saturated neon primaries—electric magenta, acid yellow, neon cyan, hot orange—contrasted against near-black outlines and pure white highlights. High-contrast, maximum visual punch. Subject: [在此処填写您的主体], original composition and character preserved faithfully. No text, no lettering, no speech bubbles. Graphical, stylish, street-gallery-worthy finish.
