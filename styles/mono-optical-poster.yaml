id: mono-optical-poster
name: 黑白光学概念海报（Monochrome Optical Concept Poster）
source: "@MrLarus / x.com/MrLarus/status/2049496194586382563"
original_credit: "提示词由 @MrLarus 创作，经 image-forge 适配为带变量的 Signature Style"
placeholder: "[主题文字，例如：失控 / 秩序的边界 / Paradox / 博弈]"

# ── 变量说明 ──────────────────────────────────────────────────────────
# 使用时替换以下变量：
#   [主题文字]   核心标题文字（中文/英文均可）
#   [图片比例]   如 3:4（竖版）/ 1:1（方版）/ 16:9（横版），默认 3:4
#
# 若用户未提供主题文字，必须主动问："主题词是什么？（中/英均可）"
# ─────────────────────────────────────────────────────────────────────

prompt: |
  请根据用户输入的【主题文字】与【图片比例】，创作一张高完成度的「黑白光学抽象概念海报 / Monochrome Optical Concept Poster」。

  【用户输入】
  主题文字：[主题文字]
  图片比例：[图片比例]

  这不是普通文字海报，不是简单排版海报，也不是具象插画，而是一张以"主题文字"为核心、融合「黑白光学艺术 / Op Art」「参数化生成图形」「生物形态抽象」「实验性瑞士风排版」的高完成度概念海报。整体必须具有强烈的视觉冲击力、现代设计感、抽象性、秩序感、哲学感和系列化统一风格。

  【整体风格要求】
  1. 整体采用黑白单色为主，背景为干净的浅米白、暖白或极浅灰纸面质感。
  2. 画面主视觉应呈现高对比度的抽象图形语言，结合光学错觉、镜像对称、波纹、重复曲线、参数化弧线、放射线、莫尔纹、同心线、点阵、棋盘格变形、流体形态、羽毛状或翼状结构、节点、回路、路径、能量场等元素。
  3. 图形不能只是装饰，要与【主题文字】形成语义呼应：让抽象图形像是在"解释"这个主题的情绪、结构、张力或关系。
  4. 风格应偏高级平面设计、实验海报、未来感视觉档案、设计展海报、概念专辑封面气质，避免商业促销感、廉价感和普通社媒模板感。

  【主标题要求】
  1. 将【主题文字】作为整张海报最重要的主标题，放在画面中心或核心视觉区域，字号大、识别强、视觉统治力强。
  2. 主标题必须准确渲染，不能出现错字、漏字、别字。
  3. 若【主题文字】为中文，则以中文大标题为主，可自动补充一个小型英文副标题或英文解释作为辅助信息；若【主题文字】为英文，则英文主标题为主，可自动补充一行较小的中文辅助说明。
  4. 主标题字体风格应现代、克制、有力量感，适合高端设计海报，不要卡通感，不要过度花哨。

  【构图与视觉结构要求】
  根据主题自动选择最适合的构图结构：
  - 对称对峙式 / 中轴爆发式 / 双向碰撞式 / 共振聚合式 / 节点路径式 / 漩涡回路式 / 仪式展陈式
  - 冲突/对抗/博弈感 → 左右对冲、双核对峙、中心碰撞、分裂与拉扯
  - 融合/共生/连接感 → 镜像呼应、向心汇聚、波纹共鸣、结构互嵌
  - 思辨/系统/哲学感 → 节点、连线、回路、路径、均衡结构、参数图示感

  【排版与信息层级】
  - 主标题外可加少量辅助信息：小号英文关键词、竖排边注、顶/底导航式短词、结构标签
  - 可加入点、线、十字、星号、圆环、网格、坐标感符号，提升系统感
  - 版式要有呼吸感与留白，同时保持足够信息密度

  【主题翻译逻辑】
  - 冲突感 → 拉扯、对峙、碰撞、裂变、压迫
  - 融合感 → 汇聚、回响、流动、互嵌、共鸣
  - 困境/博弈感 → 分叉、选择、节点、均衡、路径、张力
  - 历史/史诗感 → 器物、纹样、仪式感、权力感的抽象化表达（保持现代黑白实验风格）

  【画面质感】
  - 黑白干净利落，边缘清晰，偏高级印刷视觉
  - 可适当加入细微纸感、微弱噪点、印刷感，但不要做旧过头
  - 避免写实人物、真实场景摄影、卡通插画、彩色商业广告风

  最终输出：构图完整、主标题醒目、抽象图形强烈、排版高级、黑白统一、具有系列感与收藏感的概念海报。
