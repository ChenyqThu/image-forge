id: geo-typography
name: 平面几何字体概念海报
source: "@MrLarus / x.com/MrLarus/status/2048691361692504335"
original_credit: "提示词由 @MrLarus 基于 @xiaoxiaodong01 灵感调整，经 image-forge 适配为 Signature Style"
placeholder: "[核心文字/词组/短句]"

# ── 变量说明 ──────────────────────────────────────────────────────────
# 使用时替换以下变量：
#   [核心文字/词组/短句]   主视觉文字（中/英/混排均可）
#   [文字语言]             中文 / 英文 / 中英混排
#   [可选补充语境]         补充背景信息（无则留空）
#   [可选情绪倾向]         如"孤独感""力量""对抗"（无则 auto）
#   [可选禁用元素]         如"不要红色""不要圆形"（无则留空）
# ─────────────────────────────────────────────────────────────────────

prompt: |
  请基于用户输入的核心文字「[核心文字/词组/短句]」，文字语言：[文字语言]，
  创作一张高完成度的「现代平面几何字体概念海报 / Geometric Typographic Concept Poster」。

  这不是普通插画，也不是简单把文字放大后的字效海报，而是一张"基于主题词含义自动构建视觉隐喻"的现代平面设计海报。
  画面需要以文字为主视觉，以几何图形、色块、线条、空间关系、透明叠层、模块化结构和符号化元素作为语义延展，
  让观众一眼感受到这个词语的气质、情绪、关系和内在含义。

  请先真正理解「[核心文字/词组/短句]」的字面含义、情绪气质、隐含象征、文化联想和语义张力，
  并判断它属于以下哪类主题，选择对应的视觉策略：
  - 情绪型（孤独/自由/热烈/焦虑/压抑）→ 重点通过色块关系、留白比例、图形距离、方向感、密度变化来表达
  - 动作型（逃离/生长/爆发/旋转/流动）→ 重点通过几何运动轨迹、字体切割与错位、斜向构图和速度感来表达
  - 关系型（连接/对抗/平衡/分裂/融合）→ 重点通过两个主体的距离、重叠、碰撞、包裹、嵌套、对称失衡来表达
  - 抽象概念型（时间/秩序/边界/偏见）→ 找到简洁视觉隐喻，通过系统感排版、网格变化、遮挡、层级来表达
  - 具象物象型（火焰/种子/镜子）→ 不要写实插图，将其提炼为符号化、几何化、结构化的视觉表达

  核心排版规则：
  - 用户输入的文字必须作为画面核心标题，成为第一视觉主体
  - 文字可横排/竖排/拆分/错位/重组/局部遮挡/嵌套/切片/透明覆盖，或与几何图形形成正负形关系
  - 图形元素必须围绕文字展开，可穿过/支撑/切割/包裹文字，与文字形成结构互动
  - 元素数量克制：1组核心文字主体 + 1组核心几何隐喻系统 + 少量辅助线条/标签/点阵/小字
  - 必须保留足够留白，让画面透气清爽有当代感
  - 可加一句极短副标题（如"A visual state of ____"或中文语境自动生成），但不能抢核心文字视觉权重

  配色规则（根据主题词气质自动选择）：
  - 活力/热烈/爆发 → bright orange / coral red / vivid yellow / electric blue
  - 冷静/秩序/理性 → navy / black / white / gray / silver blue
  - 温柔/记忆/柔和 → soft pink / warm white / pale green / muted lavender
  - 冲突/危险/对抗 → red / black / white / neon green 高对比
  - 自由/轻盈/开放 → sky blue / mint green / white / bright yellow / aqua cyan
  - 神秘/哲思/深层意识 → indigo / deep violet / black 与亮色点缀
  整体要"轻盈但有力量，现代但不空洞"，可用高明度现代色、少量渐变、半透明几何片，不做旧不脏不厚重。

  图形语言：
  - 图形必须服务主题语义，不能只是装饰
  - 可使用：圆形/矩形/三角形/线段/圆环/路径线/网格/波形/箭头/模块色块/透明叠层/点阵/标签/切片/偏移框
  - 图形必须与文字共同构成一个完整的"视觉句子"

  整体质感：
  - Modern graphic design / Geometric composition / Typographic poster
  - Experimental typography / Clean flat design / Crisp vector-like precision
  - Contemporary visual identity aesthetics
  - 干净 crisp vector-like，带轻微数字感，精致高级平面当代
  - 可有非常轻微的渐变、少量透明叠层、细腻克制的设计颗粒感
  - 禁止：厚重纹理/脏旧纸张/过度噪点/油画质感/复古拼贴/大面积阴影/复杂立体建模

  禁止风格：普通插画/写实摄影/复古文学封面/包豪斯旧海报感/构成主义老派/厚重建筑隐喻/
  暗黑戏剧化/电商海报感/PPT封面感/过度模板感

  最终成图应让人感觉："这个词被设计成了一个视觉符号"、
  "图形不是装饰，而是在解释这个词"、"字体、图形、色彩和留白共同组成了一个完整的视觉句子"。
