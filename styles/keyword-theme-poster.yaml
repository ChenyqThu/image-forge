id: keyword-theme-poster
name: 主题词收藏级海报
source: "@xiaoxiaodong01 / x.com/xiaoxiaodong01/status/2054231524997026195"
original_credit: "提示词由 @xiaoxiaodong01 基于 @semihdev 灵感调整，经 image-forge 适配为 Signature Style"
placeholder: "[主题词]"

# ── 变量说明 ──────────────────────────────────────────────────────────
# 使用时替换以下变量：
#   [主题词]   任意名词：城市、地点、人物、品牌、节日、文化概念、物件、情绪、建筑、自然元素等
#              会自动转为英文标题或拼音罗马化形式作为主视觉
# ─────────────────────────────────────────────────────────────────────

prompt: |
  生成一张超高分辨率、印刷级别、具有收藏价值的主题海报。

  主题词：[主题词]

  请围绕这个主题词建立完整视觉系统，并将它转化为画面中央的巨型英文主标题；若主题词不是英文，请自然转换为准确、优雅、适合作为海报标题的英文表达或拼音罗马化形式，不要出现乱码、错误拼写或多余解释。

  画面以巨型主标题为核心，字母高耸、粗壮、清晰，像一组被打开的主题橱窗。每个字母内部延展出与主题相关的场景、符号、结构、纹理、空间与叙事片段，它们彼此连通，形成连续而完整的视觉故事。不要机械切割画面，不要平均分配内容，让每个字母内部都像一个被精心组织却仍然自然流动的世界。

  顶部设置一条横向剪影式装饰带，可根据主题自然生成相应元素：轮廓、图形、线条、符号、交通、建筑、植物、器物、抽象结构、程序化几何或其他相关视觉片段。它不是孤立装饰，而应与主体在色彩、节奏、密度和气质上完全统一，共同构成完整的版式张力。

  整体风格兼具高端编辑设计、中世纪现代、瑞士平面设计与扁平几何插画的气质。构图克制，留白讲究，线条准确，边缘利落，画面安静但具有吸引力。色彩逻辑必须建立在"明亮、柔和、低饱和"的基础上，整体气质清透、轻盈、优雅、精致，避免沉闷、厚重、灰暗或脏浊。以奶白、雾粉、浅蓝、薄荷绿、砂岩、浅灰这一类色相为基础组织画面，也可以延展出柔和杏色、鼠尾草绿、粉蜡橙、淡芥末、灰玫瑰、浅雾紫等相近体系，但所有颜色都应保持低饱和、高级、通透、有空气感。

  配色不要走单色压暗路线，也不要落入自然主义的蓝天白云默认方案。应采用一种更聪明的综合色彩编排：以浅亮底色为画面基底，以温柔而克制的综合色组建层次，再以少量更明确的强调色作为视觉锚点。强调色可以略微跳出，但仍需保持审美约束，像一枚点醒画面的按钮，而不是喧宾夺主。整体色彩关系应具有电影感与设计感，明亮但不刺眼，柔和但不寡淡，低饱和但不无聊，丰富但不杂乱，轻盈却不发飘，复古却不陈旧。

  暗部必须被严格控制，只作为局部结构、轮廓、节奏或视觉支点使用，不能大面积压低画面情绪。阴影应偏轻、偏薄、偏干净，不制造沉重戏剧感。整幅作品应更接近一种经过精密校准的明亮世界：温柔、清醒、聪明、讲究，并具有让人想收藏的视觉愉悦。

  所有可见文字必须使用英文或准确罗马化标题，拼写绝对正确，排版专业、稳定、干净，不出现乱码、变形、破碎字母、随机符号或多余文字。整体效果应达到博物馆级、收藏级海报水准，既有主题识别度，也有大师级的色彩判断与形式完成度。

  默认画幅比例为 2:1。
