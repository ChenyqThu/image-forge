id: city-line-poster
name: 极简线条城市海报
source: "@xiaoxiaodong01 / x.com/xiaoxiaodong01/status/2053782162907029877"
original_credit: "提示词由 @xiaoxiaodong01 基于 @Goodmanprotocol 原作改编，融入城市调研逻辑，经 image-forge 适配为 Signature Style"
inspiration: "灵感来自人民币插画的精致感 × 城市品牌收藏级海报"

# ── 变量说明 ──────────────────────────────────────────────────────────
# 使用时替换以下变量：
#   [主题]     必填。城市名 / 具体街道或地标 / 地址或坐标（可附参考图）
#              例：上海外滩 / 东京新宿歌舞伎町 / 纽约时代广场
# ─────────────────────────────────────────────────────────────────────

prompt: |
  请根据最后输入的主题创作一幅超高分辨率竖版极简线条城市海报。

  如果主题是一座城市，请先理解这座城市的核心气质，从空间景观、街头生活、人文风情、
  商业氛围、饮食记忆、地方文化、历史层次与日常节奏中提炼视觉线索，并将这些线索自然
  组织进同一幅完整而统一的城市画面之中，使画面呈现真实而鲜活的城市切面，而不是零散
  拼贴。

  如果主题是具体街道、街区、地标、商圈或代表性地点，请以该地点的真实空间关系为核心，
  准确呈现街道结构、建筑界面、店铺招牌、交通设施、文字系统、人群状态与现场氛围，并
  保留其最有辨识度的在地特征。

  如果主题包含地址、坐标或参考图片，请优先依据真实信息理解场景，不要凭空杜撰，不要
  随意替换地点特征，不要画成与实际地点无关的通用城市景观。

  整体画面应避免廉价旅游宣传式表达，不做明信片式直白展示，而是捕捉一个真实、精致、
  富有生活感的城市瞬间。让建筑、街道、标牌、橱窗、街头设施与人物活动自然共生，地标
  克制地融入环境，不夸张，不喧宾夺主。人物应体现本地真实穿着、年龄层次、生活方式与
  行动节奏，可出现通勤、步行、交谈、骑行、购物、等候、用餐或休憩等自然状态。

  画面采用竖版正面街头视角，使用极简矢量线描、纤细准确的单线、清晰几何透视、克制
  留白与高密度但有秩序的细节组织，形成安静、现代、灵动且高级的视觉秩序。整体应具有
  城市品牌视觉与收藏级旅行海报的完成度。

  顶部设置醒目的主标题，副标题使用当地语言与国家或地区信息。所有街头文字、招牌与
  排版必须清晰、自然、真实、专业，避免乱码、错误文字与随意拼写。

  关于色彩，请不要从固定选项中机械挑选，也不要让不同城市反复落入相似的配色模板。
  请先理解主题本身的气候、光线、时间感、建筑材料、历史气息、产业结构、商业温度、
  饮食印象、自然环境与情绪质地，再由这些因素综合提炼出专属于该主题的主色与底色关系。
  每个主题的颜色都应是独立生成的，具有明确的在地性与审美依据，而不是套版结果。
  允许颜色呈现温度、湿度、年代感、都市能量或文化性格上的差异。主色负责建立城市的
  精神气质，底色负责提供空气感与纸感，两者共同构成统一而鲜明的单色印刷美学。即使
  只使用一组主色与底色，也应通过线条疏密、明度层次、局部压重、留白比例与细节节奏
  形成丰富而细腻的视觉变化，避免单调和平铺。

  最终成品需呈现超高分辨率、可打印、线条清晰、细节丰富、风格统一、审美高级的城市
  海报效果。

  主题：[主题]
