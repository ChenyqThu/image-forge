id: monument-valley
category: illustration
name: "纪念碑谷几何治愈美学"
source: "小小东 @xiaoxiaodong01 / x.com/xiaoxiaodong01/status/2050426507043209321 (2026-05-02)"

# ──────────────────────────────────────────
# 风格核心定义
# ──────────────────────────────────────────
# 两套变体，原版提示词已内嵌：
# elegant（素雅版）：语义转译为几何空间，莫兰迪低饱和浅色，哑光质感，1-2氛围元素
# colorful（多色版）：空间+中文排版双核心，通透动态配色，中文作为平面设计主标题

description: |
  纪念碑谷气质极简超现实主义3D艺术海报。
  等距视角几何建筑，语义转译为空间结构，微型人影，排版叠加。
  两套变体：elegant（素雅/莫兰迪）/ colorful（多色/中文主导版式）。

# ──────────────────────────────────────────
# 变量定义
# ──────────────────────────────────────────
variables:
  required:
    - name: theme_text
      desc: "主题短句（中文），如：太阳就站在黑夜的门口 / 千金散尽还复来"
    - name: sub_text
      desc: "英文副标题或对照句，如：THE SUN STANDS AT THE DOOR OF THE NIGHT"
  optional:
    - name: variant
      desc: "elegant（素雅版，默认）/ colorful（多色版）"
      default: "elegant"
    - name: vol_label
      desc: "VOL标签，如 VOL. 07，留空则不显示"
      default: ""
    - name: aspect_ratio
      desc: "比例，默认 3:4；多色版推荐 2:1（1536x1024）"
      default: "3:4"

# ──────────────────────────────────────────
# 素雅版 Prompt（原版）
# ──────────────────────────────────────────
prompt_elegant: |
  Generate a "Monument Valley aesthetic" minimalist surrealist 3D art poster based on the theme below.

  Core approach:
  First understand the meaning, emotion, and imagery of the input, then translate it into a set of
  architecturally-inspired geometric spaces — do NOT mechanically turn Chinese characters into 3D letterforms.
  Extract the core semantics and weave keywords, atmosphere, or symbolic elements cleverly into the
  main form, spatial structure, and typography.

  Main subject:
  Generate a Monument Valley-style three-dimensional geometric scene from the theme's semantics —
  platforms, walls, archways, corridors, bridges, staircases, labyrinths, or floating structures.
  Use a light top-down isometric / axonometric perspective overall. The image should look like a
  premium design poster, architectural concept model, or art magazine cover.

  Color and texture:
  Keep overall tone premium, bright, clean, suitable for print output. Main palette: cream white,
  light gray, sandstone, misty rose, pale blue, mint green, light apricot, soft warm gray —
  all low-saturation light tones. Minimize large dark areas. Add only a small amount of accent color
  based on theme semantics, used precisely on local edges, interior spaces, cut surfaces, archway
  depths, or tiny decorative details. Material: matte micro-cement, gypsum, frosted resin, or
  high-quality paper sculpture texture. Light is soft and luminous, layers are clear.

  Composition and depth:
  The main subject remains the visual center, but add a small amount of thematically resonant
  decorative elements around it to create a complete poster feel — avoid empty surroundings.
  Decoration must be restrained and simple, naturally forming foreground / midground / background
  or subject / supporting / micro-decoration layers. May include small repeated geometrics, floating
  small volumes, thin structural lines, local symbols, corner echo elements, or micro-landscapes.

  Atmospheric elements:
  Add only one or two minimal poetic elements: faint light, pale moon, thin branches, bird silhouette,
  light mist, petals, distant small volumes, or symbolic shapes. Make the image poetic but do not pile up.

  Human scale:
  May add one or two very small-scale figures as emotional anchors. Figures must not exceed 8% of
  image height. Quiet natural poses: standing, walking, gazing, passing through. Never overpowering.

  Typography:
  May add very minimal design-oriented text: small subtitle, number, year, vol.01, vertical
  auxiliary text, or one short handwritten English phrase. Typography must serve the image, not dominate.

  Final requirements:
  Overall: simple, premium, light, cleverly layered. Combines Monument Valley spatial language,
  semantic translation ability, poster design sensibility, and print-level color control.

  Theme input: {theme_text}
  Sub text overlay: {sub_text}
  {vol_label}

# ──────────────────────────────────────────
# 多色版 Prompt（原版）
# ──────────────────────────────────────────
prompt_colorful: |
  Generate a "Monument Valley aesthetic" minimalist surrealist 3D art poster based on the theme below.

  Core logic (critical):
  Do NOT forcibly turn Chinese text into 3D architectural forms.
  First understand the theme semantics and use "spatial structure" to express emotion and metaphor.
  Then use "Chinese typography" as the visual headline — both elements work in coordination,
  not merged or distorted together.

  Spatial design:
  Build a Monument Valley-style geometric space (platforms / staircases / archways / corridors /
  floating structures), using isometric perspective.
  Space must serve the theme expression — use height differences, paths, occlusion, isolation,
  connection to metaphorically convey emotion. Not purely formal stacking.

  Chinese text design (key focus):
  Chinese must appear as a clear, legible main headline and become one of the visual cores of the layout.
  Use "graphic design treatment" rather than 3D extrusion:
  - Use ultra-minimal sans-serif / thin gothic / geometric character forms
  - May apply slight stretching, cutting, offset, or negative space design
  - May interact with the space via occlusion, threading, or overlay (but NOT become architecture)
  - Maintain premium, restrained, readable quality

  Supporting text:
  May add small amounts of English or numeric info (vol. / year / number) as layout balance elements,
  but clearly subordinate in visual weight to the Chinese headline.

  Color system (key optimization):
  Use "Monument Valley dynamic color palette" adapted for print:
  - Base: bright, soft, low-saturation (cream, misty rose, pale blue, mint green, sandstone, light gray)
  - Avoid large areas of dark color or dead black
  - Use same-hue lightness variations to build spatial layers (front / mid / back)
  - Add 1-2 high-purity accent colors for visual focal points (archway interiors / edges / turning points)
  Overall color must feel "transparent, airy, layered" — not a fixed color scheme.

  Composition and layers:
  Main subject is clear, but the image must not feel empty:
  - Add small amounts of "same-origin weakened structural extensions" around the periphery
  - Use repeated geometrics, distant volumes, edge slices to create compositional closure
  - Establish foreground / midground / background relationship with depth but not excessive complexity

  Atmospheric control:
  Allow only minimal poetic elements (faint moon, micro-light, thin branches, light mist, geometric
  symbols) — just enough, no piling up.

  Human figures:
  Optional very small-scale figures (≤8%) as scale and emotional anchors. Quiet and restrained movements.

  Final effect:
  A premium design poster where "space expresses theme + Chinese-led layout" — with Monument Valley
  spatial language, clear visual hierarchy, restrained color, and strong design sensibility.
  Suitable for art exhibitions or design annuals.

  Theme input: {theme_text}
  Sub text overlay: {sub_text}
  {vol_label}

# ──────────────────────────────────────────
# 使用示例
# ──────────────────────────────────────────
examples:
  - desc: "素雅版 — 太阳与黑夜"
    theme_text: "太阳就站在黑夜的门口"
    sub_text: "THE SUN STANDS AT THE DOOR OF THE NIGHT"
    variant: "elegant"
    vol_label: "VOL. 07"

  - desc: "多色版 — 千金散尽（2:1横版）"
    theme_text: "千金散尽还复来"
    sub_text: "WHAT IS LOST WILL RETURN AGAIN"
    variant: "colorful"
    vol_label: "VOL. 08"
    aspect_ratio: "2:1"

  - desc: "素雅版 — 以此启程"
    theme_text: "以此启程，永远有远方可以奔赴"
    sub_text: "START HERE — ALWAYS FAR AWAY"
    variant: "elegant"
    vol_label: "VOL. 07"
